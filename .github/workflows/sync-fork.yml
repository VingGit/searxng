# Sync fork with upstream SearXNG
# Add this file to your fork at .github/workflows/sync-fork.yml
#
# Uses the default GITHUB_TOKEN — no extra secrets needed.
# Runs every Sunday at 3 AM UTC. Can also be triggered manually.

name: Sync Fork

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo sync ${{ github.repository }} --branch main
